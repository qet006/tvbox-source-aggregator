name: 定时同步上游仓库
# 触发规则：定时 + 手动一键同步
on:
  # cron 是UTC时区，格式：分 时 日 月 星期
  # 示例1：每天北京时间早8点（UTC 0点）cron: '0 0 * * *'
  # 示例2：每6小时同步一次 cron: '0 */6 * * *'
  schedule:
    - cron: '30 1 * * 1,4'
  # 仓库页面Actions标签可手动点按钮执行
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取当前Fork代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整提交历史，必须加
          persist-credentials: false # 关闭默认凭证，避免推送权限问题

      - name: 配置Git提交身份
        run: |
          git config user.name "Sync Bot"
          git config user.email "bot@github.com"

      - name: 添加上游仓库
        run: git remote add upstream https://github.com/qq148376839/tvbox-source-aggregator

      - name: 拉取上游全部更新
        run: git fetch upstream

      - name: 合并上游主分支（main/master二选一）
        # --ff-only 仅无冲突快进合并；有冲突会直接失败，不会覆盖你的代码
        run: git checkout main && git merge upstream/main --ff-only

      - name: 推送更新到自己的Fork
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://${{ github.actor }}:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git push origin main
